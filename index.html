<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>City Weather Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="weather-card" aria-labelledby="weather-title">
        <div class="hero-copy">
          <p class="eyebrow">Live Weather</p>
          <h1 id="weather-title">City Forecast Snapshot</h1>
          <p class="intro">
            Search for any city to see current conditions with temperature,
            humidity, wind, and a plain-language status.
          </p>
        </div>

        <form id="search-form" class="control-row search-form">
          <label class="select-label" for="city-input">Search for a city</label>
          <div class="search-controls">
            <input
              id="city-input"
              class="city-input"
              type="text"
              name="city"
              placeholder="Enter a city name"
              autocomplete="off"
              aria-label="Enter a city name"
            />
            <button id="search-button" class="search-button" type="submit">
              Search
            </button>
          </div>
        </form>

        <div
          id="status"
          class="status-banner"
          role="status"
          aria-live="polite"
        >
          Loading current weather...
        </div>

        <section
          id="weather-content"
          class="weather-content hidden"
          aria-label="Current weather details"
        >
          <div class="primary-stat">
            <p id="location" class="location">Manama, Bahrain</p>
            <p id="temperature" class="temperature">--°C</p>
            <p id="condition" class="condition">Waiting for weather data</p>
          </div>

          <div class="metrics-grid">
            <article class="metric">
              <span class="metric-label">Humidity</span>
              <strong id="humidity" class="metric-value">--%</strong>
            </article>
            <article class="metric">
              <span class="metric-label">Wind Speed</span>
              <strong id="wind-speed" class="metric-value">-- km/h</strong>
            </article>
          </div>
        </section>

        <button id="retry-button" class="retry-button hidden" type="button">
          Try Again
        </button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
